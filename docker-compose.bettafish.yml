version: "3.9"

services:
  bettafish:
    image: ghcr.io/666ghj/bettafish:latest
    container_name: bettafish
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_ENABLE_FILE_WATCHER=false
    ports:
      - "5000:5000"
      - "8501:8501"
      - "8502:8502"
      - "8503:8503"
    depends_on:
      - bettafish-db
    volumes:
      - ./third_party/BettaFish/logs:/app/logs
      - ./third_party/BettaFish/final_reports:/app/final_reports
      - ./third_party/BettaFish/insight_engine_streamlit_reports:/app/insight_engine_streamlit_reports
      - ./third_party/BettaFish/media_engine_streamlit_reports:/app/media_engine_streamlit_reports
      - ./third_party/BettaFish/query_engine_streamlit_reports:/app/query_engine_streamlit_reports
    env_file:
      - ./third_party/BettaFish/.env

  bettafish-db:
    image: postgres:15
    container_name: bettafish-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bettafish
      POSTGRES_PASSWORD: bettafish
      POSTGRES_DB: bettafish
    ports:
      - "5444:5432"
    volumes:
      - ./third_party/BettaFish/db_data:/var/lib/postgresql/data
    env_file:
      - ./third_party/BettaFish/.env
